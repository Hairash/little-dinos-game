[tool.ruff]
# Enable Django-specific rules
target-version = "py311"
line-length = 100
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "ARG", # flake8-unused-arguments
    "SIM", # flake8-simplify
    "TCH", # flake8-type-checking
]
ignore = [
    "E501",  # Line too long (handled by black)
    "B008",  # Do not perform function calls in argument defaults
    "ARG001", # Unused function argument (common in Django views)
    "ARG002", # Unused method argument
]

[tool.ruff.per-file-ignores]
"*/migrations/*" = ["E501", "F401", "F403"]  # Ignore some rules in migrations
"*/tests/*" = ["ARG001", "ARG002", "S101"]  # Allow unused args and assert in tests

[tool.black]
line-length = 100
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | migrations
  | __pycache__
  | staticfiles
)/
'''

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false  # Start lenient, tighten later
disallow_incomplete_defs = false
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
ignore_missing_imports = false
# Django-stubs handles Django model types
show_error_codes = true

[[tool.mypy.overrides]]
module = [
    "channels.*",
    "channels_redis.*",
    "daphne.*",
    "redis.*",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "game.models",
    "game.tests.*",
    "game.views",
    "game.consumers",
    "game.services.game_logic",
    "server.auth",
]
# Django models and related code use dynamic attributes that mypy struggles with
# These are runtime-safe but hard to type-check statically
# server.auth uses get_user_model() which returns AbstractBaseUser without full type info
ignore_errors = true

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "server.settings"
python_files = ["tests.py", "test_*.py", "*_tests.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--tb=short",
    "--strict-markers",
    "--disable-warnings",
    "--reuse-db",
]
testpaths = ["game"]

